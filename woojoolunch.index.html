<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- 모바일 앱처럼 보이게 하는 설정 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#FF8B8B">
    <title>우주 엄마 점심 구조대</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --mom-peach: #FFD8CC;
            --mom-sage: #D4E2D4;
            --mom-warm: #FFF9F0;
            --mom-brown: #705D56;
            --mom-accent: #FF8B8B;
            --enfp-yellow: #FFD93D;
            
            --primary-color: var(--mom-accent);
            --bg-color: var(--mom-warm);
            --card-bg: #FFFFFF;
            --text-main: #4A4A4A;
            --text-sub: #7A7A7A;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding-bottom: env(safe-area-inset-bottom, 50px);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            text-align: center;
            padding: 40px 0 20px;
        }

        header h1 {
            font-weight: 900;
            font-size: 2rem;
            color: var(--mom-accent);
            margin-bottom: 5px;
        }

        .woojoo-age {
            font-size: 1.1rem;
            color: var(--mom-brown);
            font-weight: 900;
            margin-bottom: 15px;
            background: white;
            display: inline-block;
            padding: 8px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 2px solid var(--mom-peach);
        }

        header p.subtitle {
            font-size: 0.95rem;
            color: var(--mom-brown);
            font-weight: 500;
            margin-bottom: 20px;
            padding: 0 10px;
        }

        .status-box {
            display: inline-block;
            background: white;
            border: 2px solid var(--mom-peach);
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 700;
            color: var(--mom-brown);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            font-size: 0.9rem;
        }

        .filter-section {
            margin: 20px 0;
            text-align: center;
        }

        .filter-title {
            font-weight: 700;
            color: var(--mom-brown);
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .weather-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .chip {
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: white;
            color: var(--text-main);
            cursor: pointer;
            font-weight: 700;
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            font-size: 0.85rem;
        }

        .chip.active {
            background: var(--mom-accent);
            color: white;
            box-shadow: 0 5px 15px rgba(255, 139, 139, 0.3);
        }

        .chip.weather.active {
            background: var(--enfp-yellow);
            color: var(--mom-brown);
            box-shadow: 0 5px 15px rgba(255, 217, 61, 0.4);
        }

        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 40px;
        }

        .menu-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            transition: transform 0.2s;
            opacity: 0;
            transform: scale(0.95);
        }

        .menu-card.show {
            opacity: 1;
            transform: scale(1);
        }

        .menu-card .emoji {
            font-size: 2.5rem;
            background: var(--mom-warm);
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            flex-shrink: 0;
        }

        .card-content {
            flex-grow: 1;
        }

        .menu-card .title {
            font-size: 1.2rem;
            font-weight: 900;
            color: var(--mom-brown);
        }

        .info-tags {
            margin: 5px 0;
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 0.7rem;
            padding: 2px 8px;
            background: #F0F0F0;
            border-radius: 5px;
            font-weight: 700;
        }

        .helper-text {
            font-size: 0.8rem;
            color: var(--mom-accent);
            font-weight: 700;
            margin: 5px 0;
        }

        .order-btn {
            background: var(--mom-brown);
            color: white;
            text-decoration: none;
            padding: 12px 15px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 700;
            white-space: nowrap;
            text-align: center;
        }

        .roulette-section {
            background: var(--mom-sage);
            padding: 40px 20px;
            border-radius: 30px;
            text-align: center;
            margin-bottom: 50px;
            border: 2px dashed rgba(0,0,0,0.05);
        }

        .roulette-section h2 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: var(--mom-brown);
        }

        #roulette-display {
            font-size: 1.6rem;
            font-weight: 900;
            height: 80px;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            color: var(--mom-accent);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        .roll-btn {
            background: var(--mom-accent);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 10px rgba(255, 139, 139, 0.4);
        }

        footer {
            text-align: center;
            color: var(--mom-brown);
            font-size: 0.8rem;
            padding: 30px 20px;
            border-top: 1px solid var(--mom-peach);
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            .menu-card { flex-direction: column; text-align: center; padding: 25px 15px; }
            .order-btn { width: 100%; margin-top: 10px; }
            .weather-grid { grid-template-columns: repeat(2, 1fr); }
            header h1 { font-size: 1.8rem; }
        }

        .spinning { animation: pulse 0.1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>우주 엄마의 점심 구조대 🍼</h1>
        <div class="woojoo-age" id="age-counter">👶 우리 우주 만나는 중...</div>
        <p class="subtitle">오늘도 우리 <b>우주</b> 보느라 고생 많으셨어요!<br>감성파 ENFP 엄마를 위한 날씨 맞춤 추천입니다.</p>
        <div class="status-box" id="status-msg">우주 엄마 기분 체크 중...</div>
    </header>

    <section class="roulette-section">
        <h2>"아무거나 정해줘!" 🎰</h2>
        <div id="roulette-display">오늘의 메뉴는?</div>
        <button class="roll-btn" id="roll-btn" onclick="spinRoulette()">메뉴 정해줘! (클릭)</button>
        <div id="roulette-link"></div>
    </section>

    <section class="filter-section">
        <div class="filter-title">✨ 오늘의 날씨는 어떤가요?</div>
        <div class="weather-grid" id="weather-filter">
            <button class="chip weather" onclick="filterByWeather('맑음', this)">☀️ 맑음</button>
            <button class="chip weather" onclick="filterByWeather('비', this)">☔ 비/눈</button>
            <button class="chip weather" onclick="filterByWeather('흐림', this)">☁️ 흐림</button>
            <button class="chip weather" onclick="filterByWeather('쌀쌀', this)">❄️ 쌀쌀</button>
        </div>

        <div class="filter-title">📋 상황별 모아보기</div>
        <div class="filter-grid" id="filter-container">
            <button class="chip active" onclick="filterMenu('all', this)">전체보기</button>
            <button class="chip" onclick="filterMenu('한손', this)">한 손 식사 (우주 안고)</button>
            <button class="chip" onclick="filterMenu('영양', this)">기력 회복 (보양식)</button>
            <button class="chip" onclick="filterMenu('초스피드', this)">초스피드 (배달 1위)</button>
        </div>
    </section>

    <main class="menu-grid" id="menu-container">
        <!-- JS 렌더링 -->
    </main>

    <footer>
        <p style="font-weight: 700; color: var(--mom-accent); margin-bottom: 5px;">감성이 풍부한 ENFP 우주 엄마, 사랑해요! ❤️</p>
        <p>© 2025 육아지원군 남편 | 선유로 207 우주네 집</p>
    </footer>
</div>

<script>
    const menuData = [
        { id: 1, name: "본죽 소고기미역죽", emoji: "🥣", tags: ["영양", "초스피드"], weather: ["흐림", "쌀쌀"], baby: "한 손 식사 가능", note: "속을 편안하고 따뜻하게 데워주는 메뉴예요.", search: "서울+영등포구+선유로+207+본죽" },
        { id: 2, name: "샌드위치 & 주스", emoji: "🥪", tags: ["한손", "초스피드"], weather: ["맑음"], baby: "완벽 한손 식사", note: "햇살 좋은 날, 아기 안고 산뜻하게 즐기세요!", search: "서울+영등포구+선유로+207+샌드위치" },
        { id: 3, name: "전복 비빔밥", emoji: "🥗", tags: ["영양"], weather: ["맑음", "흐림"], baby: "수저만 있으면 끝", note: "기운 없는 날에도 영양 가득 비빔밥이 정답!", search: "서울+영등포구+선유로+207+비빔밥" },
        { id: 4, name: "스팸 계란 김밥", emoji: "🍙", tags: ["한손", "초스피드"], weather: ["맑음", "흐림"], baby: "한 입에 쏙", note: "뒷정리도 필요 없는 초간편 든든 식사.", search: "서울+영등포구+선유로+207+김밥" },
        { id: 5, name: "연어 포케", emoji: "🥗", tags: ["영양", "초스피드"], weather: ["맑음"], baby: "프레쉬한 한 끼", note: "청명한 날씨에 어울리는 알록달록 ENFP 맞춤 식단!", search: "서울+영등포구+선유로+207+포케" },
        { id: 6, name: "사골 곰탕", emoji: "🍲", tags: ["영양"], weather: ["비", "쌀쌀"], baby: "든든함 보장", note: "비 오는 날, 진한 국물로 몸도 마음도 힐링하세요.", search: "서울+영등포구+선유로+207+곰탕" },
        { id: 7, name: "토마토 파스타", emoji: "🍝", tags: ["영양"], weather: ["비", "흐림"], baby: "포크로 돌돌", note: "감성적인 날씨에 분위기 내기 딱 좋은 메뉴!", search: "서울+영등포구+선유로+207+파스타" }
    ];

    function updateWoojooAge() {
        const birthDate = new Date('2026-02-24');
        const today = new Date();
        const diffTime = today - birthDate;
        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24)) + 1;
        document.getElementById('age-counter').innerText = `👶 우리 우주 생후 ${diffDays}일째`;
    }

    function updateStatus() {
        const now = new Date();
        const h = now.getHours();
        let msg = "";
        if (h < 11) msg = "우리 우주 낮잠 자면 좋겠네요... ☕";
        else if (h >= 11 && h < 14) msg = "지금이 우주 엄마 식사 시간! 놓치지 마세요! 🍱";
        else msg = "간식이라도 꼭 챙겨 드세요! 🍎";
        document.getElementById('status-msg').innerText = msg;
    }

    function renderCards(data) {
        const container = document.getElementById('menu-container');
        container.innerHTML = '';
        data.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'menu-card';
            card.innerHTML = `
                <div class="emoji">${item.emoji}</div>
                <div class="card-content">
                    <div class="title">${item.name}</div>
                    <div class="info-tags">
                        ${item.tags.map(t => `<span class="tag">#${t}</span>`).join('')}
                        ${item.weather.map(w => `<span class="tag" style="background:var(--enfp-yellow)">#${w}추천</span>`).join('')}
                    </div>
                    <div class="helper-text">👶 ${item.baby}</div>
                    <div style="font-size:0.8rem; color:#666;">${item.note}</div>
                </div>
                <a href="https://www.google.com/maps/search/?api=1&query=${item.search}" target="_blank" class="order-btn">📍 근처 검색</a>
            `;
            container.appendChild(card);
            setTimeout(() => { card.classList.add('show'); }, index * 50);
        });
    }

    function filterMenu(tag, element) {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        element.classList.add('active');
        if (tag === 'all') { renderCards(menuData); }
        else { renderCards(menuData.filter(item => item.tags.includes(tag))); }
    }

    function filterByWeather(weather, element) {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        element.classList.add('active');
        renderCards(menuData.filter(item => item.weather.includes(weather)));
    }

    let isSpinning = false;
    function spinRoulette() {
        if (isSpinning) return;
        isSpinning = true;
        const display = document.getElementById('roulette-display');
        const btn = document.getElementById('roll-btn');
        const linkArea = document.getElementById('roulette-link');
        btn.disabled = true;
        display.classList.add('spinning');
        let counter = 0;
        const totalDuration = 2000;
        const intervalTime = 100;
        const spinInterval = setInterval(() => {
            const randomItem = menuData[Math.floor(Math.random() * menuData.length)];
            display.innerText = `${randomItem.emoji} ${randomItem.name}`;
            counter += intervalTime;
            if (counter >= totalDuration) {
                clearInterval(spinInterval);
                display.classList.remove('spinning');
                const finalItem = menuData[Math.floor(Math.random() * menuData.length)];
                display.innerText = `${finalItem.emoji} ${finalItem.name}`;
                linkArea.innerHTML = `<a href="https://www.google.com/maps/search/?api=1&query=${finalItem.search}" target="_blank" style="display:block; margin-top:15px; color:var(--mom-accent); font-weight:900; text-decoration:none; border-bottom: 2px solid var(--mom-accent); padding-bottom: 2px;">[ 📍 여기서 주문할까요? ]</a>`;
                btn.disabled = false;
                isSpinning = false;
            }
        }, intervalTime);
    }

    window.onload = () => {
        updateWoojooAge();
        updateStatus();
        renderCards(menuData);
    };
</script>

</body>
</html>
